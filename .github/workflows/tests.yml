name: Dora Metrics Tests

on:
  push:
    branches: [ main, fix_csv ]
  pull_request:
    branches: [ main ]

jobs:
  lint-agents-md:
    name: Validate AGENTS.md line limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check AGENTS.md is under 60 lines
        run: |
          if [ ! -f AGENTS.md ]; then
            echo "ERROR: AGENTS.md not found"
            exit 1
          fi
          LINES=$(wc -l < AGENTS.md)
          echo "AGENTS.md has $LINES lines"
          if [ "$LINES" -gt 60 ]; then
            echo "ERROR: AGENTS.md exceeds 60-line limit ($LINES lines)"
            exit 1
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Generate coverage report
        run: go tool cover -func=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.out
          fail_ci_if_error: false
